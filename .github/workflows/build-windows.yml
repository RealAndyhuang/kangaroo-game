name: Build Windows EXE


on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:


jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller kangaroo_game_3.spec --clean -y
    
    - name: Create ZIP
      run: |
        cd dist
        Compress-Archive -Path KangarooAdventure3 -DestinationPath KangarooAdventure3_Windows.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: KangarooAdventure3_Windows
        path: dist/KangarooAdventure3_Windows.zip
